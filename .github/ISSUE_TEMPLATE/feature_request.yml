name: Feature request
description: An idea for a new capability
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        We're in alpha — `PHASES.md` defines the v1.0 scope. New
        feature requests are welcome to discuss but most won't make
        v1.0 unless they fit an existing phase.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user-experience need behind the feature, not the proposed solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Optional. Sketch of how it might work — UI, shortcut, settings, etc.

  - type: dropdown
    id: priority
    attributes:
      label: How blocking is this for you?
      options:
        - "Nice-to-have"
        - "Would meaningfully change my workflow"
        - "Reason I'd pick another editor"
    validations:
      required: true
