name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (Release)
    runs-on: macos-15
    timeout-minutes: 25

    env:
      DEVELOPER_DIR: /Applications/Xcode_16.app/Contents/Developer
      # 12 MB ceiling: 7.1 MB app + ~2.7 MB Sparkle framework + headroom.
      # Bumped from 8 MB when Sparkle was added in Phase 12 (auto-update
      # is mandatory for a public release; the bundle weight is the cost).
      BUNDLE_SIZE_LIMIT_MB: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit tests — main bundle
        run: |
          set -o pipefail
          xcodebuild \
            -project PicaMD.xcodeproj \
            -scheme PicaMD \
            -destination 'platform=macOS' \
            -resultBundlePath build-test/MainTests.xcresult \
            -only-testing:PicaMDTests \
            test | xcbeautify

      - name: Run unit tests — MCP sidecar bundle
        # `xcodebuild test` against the scheme runs both bundles
        # eventually but serialises them with a long delay between
        # (observed ~30 min). Running each invocation separately
        # finishes in seconds.
        run: |
          set -o pipefail
          xcodebuild \
            -project PicaMD.xcodeproj \
            -scheme PicaMD \
            -destination 'platform=macOS' \
            -resultBundlePath build-test/MCPTests.xcresult \
            -only-testing:PicaMDMCPTests \
            test | xcbeautify

      - name: Build Release bundle
        run: |
          set -o pipefail
          xcodebuild \
            -project PicaMD.xcodeproj \
            -scheme PicaMD \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build-release \
            build | xcbeautify

      - name: Bundle-size guard
        shell: bash
        run: |
          APP="build-release/Build/Products/Release/PicaMD.app"
          if [ ! -d "$APP" ]; then
            echo "::error ::Release build did not produce $APP"
            exit 1
          fi
          BYTES=$(du -sk "$APP" | awk '{print $1 * 1024}')
          MB=$(awk -v b="$BYTES" 'BEGIN { printf "%.2f", b/1024/1024 }')
          LIMIT_MB="${BUNDLE_SIZE_LIMIT_MB}"
          echo "Bundle size: ${MB} MB (limit ${LIMIT_MB} MB)"
          # Fail if bundle exceeds limit
          awk -v b="$BYTES" -v lim="$LIMIT_MB" 'BEGIN {
            limit_bytes = lim * 1024 * 1024;
            if (b > limit_bytes) {
              printf "::error ::Bundle (%.2f MB) exceeds limit of %s MB\n", b/1024/1024, lim;
              exit 1;
            }
          }'

      - name: Verify only Apple system libs are linked
        shell: bash
        run: |
          set -e
          APP="build-release/Build/Products/Release/PicaMD.app"
          BIN="$APP/Contents/MacOS/PicaMD"

          # 1. The main binary's direct dependencies must be either
          #    Apple system libs (/System, /usr) or whitelisted
          #    embedded frameworks (Sparkle for auto-update — see
          #    Phase 12 in CHANGELOG.md). Anything else is an
          #    accidentally-bundled third-party dep.
          ALLOWED_RPATH='@rpath/Sparkle\.framework/'
          NON_APPLE=$(otool -L "$BIN" \
            | tail -n +2 \
            | awk '{print $1}' \
            | grep -v -E '^(/System|/usr)' \
            | grep -v -E "^${ALLOWED_RPATH}" || true)
          if [ -n "$NON_APPLE" ]; then
            echo "::error ::Non-Apple direct linkage detected (and not whitelisted):"
            echo "$NON_APPLE"
            exit 1
          fi

          # 2. Embedded frameworks are restricted to the whitelist.
          #    Sparkle is the only third-party framework we knowingly
          #    embed (auto-update is non-negotiable for a public
          #    release). Anything else here is unintentional bloat.
          if [ -d "$APP/Contents/Frameworks" ]; then
            UNEXPECTED=$(find "$APP/Contents/Frameworks" -mindepth 1 -maxdepth 1 \
              \( -name '*.framework' -o -name '*.dylib' \) \
              ! -name 'Sparkle.framework' -print)
            if [ -n "$UNEXPECTED" ]; then
              echo "::error ::Unexpected embedded frameworks (only Sparkle.framework is allowed):"
              echo "$UNEXPECTED"
              exit 1
            fi
          fi

          echo "✓ Linked libs are either Apple system libraries or the whitelisted Sparkle framework."

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build-test/
          retention-days: 7

      - name: Upload Release bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PicaMD-${{ github.sha }}.app
          path: build-release/Build/Products/Release/PicaMD.app
          retention-days: 7
